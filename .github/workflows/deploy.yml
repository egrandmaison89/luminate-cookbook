name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/luminate-cookbook:${{ github.sha }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/luminate-cookbook:latest \
            .

      - name: Push Docker image
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/luminate-cookbook:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/luminate-cookbook:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy luminate-cookbook \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/luminate-cookbook:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --memory 2Gi \
            --cpu 2 \
            --timeout 600 \
            --min-instances 1 \
            --max-instances 10 \
            --set-env-vars "PLAYWRIGHT_BROWSERS_PATH=/ms-playwright"

      - name: Show service URL
        run: |
          gcloud run services describe luminate-cookbook \
            --region us-central1 \
            --format 'value(status.url)'
